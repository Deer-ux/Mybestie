kind = "video"
previewPath = "/mybestie-explainer/"
title = "MyBestie Explainer Video"
version = "1.0.0"
id = "artifacts/mybestie-explainer"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/mybestie-explainer/" ]
localPort = 21491

[services.development]
run = "pnpm --filter @workspace/mybestie-explainer run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mybestie-explainer", "run", "build" ]
publicDir = "artifacts/mybestie-explainer/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21491"
BASE_PATH = "/mybestie-explainer/"
